name: CI

on:
  pull_request:
    branches: ["dev", "main"]
  push:
    branches: ["dev", "main"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  JAVA_VERSION: "21"          # write your java version
  IMAGE: ${{ secrets.DOCKER_USERNAME }}/bscene-be   # write your project name

jobs:
  build:
    name: build with test
    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: ./app

    steps:
      - name: check out
        uses: actions/checkout@v4

      - name: Set up Temurin JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}   # env 값을 그대로 사용

      - name: setup gradle cache # setup-gradle@v4 는 Gradle User Home 캐싱이 기본 활성
        uses: gradle/actions/setup-gradle@v4

      # 아래 스텝은 testcontainers 가 containerd image store 기능을 필요로 할 때만 의미가 있습니다.
      # daemon.json 만 쓰면 적용되지 않으므로 docker 데몬 재시작까지 해야 동작합니다.
      # 일반적인 Testcontainers 사용이라면 이 스텝은 통째로 삭제해도 됩니다.
      - name: Enable Docker for Testcontainers
        run: |
          sudo mkdir -p /etc/docker
          echo '{"features":{"containerd-snapshotter":true}}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: run tests & build jar # using cached dependency, executing test, and instruct build jar if test success.
        run: ./gradlew clean test bootJar --no-daemon

      - name: update jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: app/build/libs/*.jar

  docker-push:
    name: docker build & push
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-22.04

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: download jar artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: build/libs

      - name: login to Docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: build & push image
        uses: docker/build-push-action@v6
        with:
          context: .

          push: true
          tags: |
            ${{ env.IMAGE }}:latest