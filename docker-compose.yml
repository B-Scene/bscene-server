services:

  spring:
    image: ${BACKEND_IMAGE}
    container_name: spring
    restart: always
    env_file: ./.env
    expose:
      - "8080"
    networks:
      - bscene

  nginx:
    image: nginx:stable
    container_name: nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - spring
    networks:
      - bscene

networks:
  bscene:
    driver: bridge
