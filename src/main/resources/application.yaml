spring:
  application:
    name: bscene
  config:
    import: optional:file:.env[.properties]

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver # MySQL JDBC
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

jwt:
  token:
    secretKey: ${JWT_SECRET_KEY}
    expiration:
      access: 3600000         # 1시간
      refresh: 1209600000     # 14일